<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>筋トレ記録アプリ</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .form-group { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .log-item { background: white; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h2>💪 筋トレログ</h2>
    <div class="form-group">
        <input type="date" id="date">
        <select id="exerciseSelect" onchange="updateExerciseInput()">
            <option value="">-- 種目を選択 --</option>
        </select>
        <input type="text" id="exercise" placeholder="新しい種目名を入力">
        <input type="number" id="weight" placeholder="重量(kg)">
        <input type="number" id="reps" placeholder="回数">
        <input type="number" id="sets" placeholder="セット数">
        <button onclick="saveLog()">記録する</button>
    </div>

    <div id="logList"></div>

    <script>
        window.onload = () => { displayLogs(); updateExerciseList(); };

        function updateExerciseList() {
            const logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            const select = document.getElementById('exerciseSelect');
            const exercises = [...new Set(logs.map(log => log.exercise))];
            
            select.innerHTML = '<option value="">-- 種目を選択 --</option>';
            exercises.forEach(ex => {
                select.innerHTML += `<option value="${ex}">${ex}</option>`;
            });
        }

        function updateExerciseInput() {
            document.getElementById('exercise').value = document.getElementById('exerciseSelect').value;
        }

        function saveLog() {
            const log = {
                date: document.getElementById('date').value,
                exercise: document.getElementById('exercise').value,
                weight: parseFloat(document.getElementById('weight').value) || 0,
                reps: parseInt(document.getElementById('reps').value) || 0,
                sets: parseInt(document.getElementById('sets').value) || 0
            };

            let logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            logs.unshift(log);
            localStorage.setItem('myWorkoutLogs', JSON.stringify(logs));
            updateExerciseList();
            displayLogs();
        }

        function deleteLog(index) {
            let logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            logs.splice(index, 1);
            localStorage.setItem('myWorkoutLogs', JSON.stringify(logs));
            updateExerciseList();
            displayLogs();
        }

        function displayLogs() {
            const logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            const logList = document.getElementById('logList');
            logList.innerHTML = '';

            logs.forEach((log, index) => {
                logList.innerHTML += `
                    <div class="log-item">
                        <div>
                            <strong>${log.date}</strong>: ${log.exercise}<br>
                            ${log.weight}kg / ${log.reps}回 x ${log.sets}セット
                        </div>
                        <button onclick="deleteLog(${index})" style="width: auto; background: #dc3545;">削除</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
