<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筋トレ記録アプリ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 10px; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .form-group { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; display: block; }
        button.save-btn { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .log-item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💪 筋トレログ</h2>
        <div class="form-group">
            <input type="date" id="date">
            <select id="exerciseSelect" onchange="updateExerciseInput()">
                <option value="">-- 種目を選択 --</option>
            </select>
            <input type="text" id="exercise" placeholder="新しい種目名">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <input type="number" id="weight" placeholder="重量">
                <input type="number" id="reps" placeholder="回数">
                <input type="number" id="sets" placeholder="セット">
            </div>
            <button class="save-btn" onclick="saveLog()">記録を保存</button>
        </div>
        <div id="logList"></div>
    </div>

    <script>
        // 日付を初期化
        document.getElementById('date').valueAsDate = new Date();

        // ページ読み込み時に実行
        window.onload = () => {
            console.log("アプリ起動");
            updateExerciseList();
            displayLogs();
        };

        function updateExerciseList() {
            const logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            const select = document.getElementById('exerciseSelect');
            const exercises = [...new Set(logs.map(log => log.exercise))].sort();
            
            select.innerHTML = '<option value="">-- 種目を選択 --</option>';
            exercises.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                opt.textContent = ex;
                select.appendChild(opt);
            });
        }

        function updateExerciseInput() {
            const val = document.getElementById('exerciseSelect').value;
            if(val) document.getElementById('exercise').value = val;
        }

        function saveLog() {
            const date = document.getElementById('date').value;
            const exercise = document.getElementById('exercise').value;
            const weight = document.getElementById('weight').value;
            const reps = document.getElementById('reps').value;
            const sets = document.getElementById('sets').value;

            if (!date || !exercise) {
                alert('日付と種目名は必須です');
                return;
            }

            const log = { date, exercise, weight, reps, sets };
            let logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            logs.unshift(log);
            localStorage.setItem('myWorkoutLogs', JSON.stringify(logs));
            
            // フォームリセット
            document.getElementById('exercise').value = '';
            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('sets').value = '';
            
            updateExerciseList();
            displayLogs();
        }

        function deleteLog(index) {
            let logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            logs.splice(index, 1);
            localStorage.setItem('myWorkoutLogs', JSON.stringify(logs));
            updateExerciseList();
            displayLogs();
        }

        function displayLogs() {
            const logs = JSON.parse(localStorage.getItem('myWorkoutLogs') || '[]');
            const list = document.getElementById('logList');
            list.innerHTML = '';
            logs.forEach((log, i) => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div><strong>${log.date}</strong> ${log.exercise}<br>${log.weight}kg / ${log.reps}回 x ${log.sets}セット</div>
                    <button class="delete-btn" onclick="deleteLog(${i})">削除</button>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
